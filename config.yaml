# coding-agent-mcp — optional configuration
#
# This file is optional. Without it, the server auto-detects installed CLIs
# (claude, codex, gemini, agent) and uses built-in defaults for each.
#
# Only add what you need to override. The most common case is just an API key:
#
#   gemini_api_key: ${GEMINI_API_KEY}
#
# For the full service-by-service format (custom models, tiers, capability
# scores, etc.) see config.example.yaml.

# ── API keys ─────────────────────────────────────────────────────────────────
# Gemini CLI requires an API key (or run `gemini auth` for OAuth).
# GEMINI_API_KEY is also read directly from the environment if set.
gemini_api_key: ${GEMINI_API_KEY}

# ── Opt out of auto-detected CLIs ────────────────────────────────────────────
# Uncomment to skip a CLI even if it's installed.
# disabled: [cursor]

# ── Local / third-party endpoints ────────────────────────────────────────────
# Add OpenAI-compatible endpoints that can't be auto-detected.
# endpoints:
#   - name: ollama
#     base_url: http://localhost:11434/v1
#     model: llama3.2
#     tier: 3
#   - name: openrouter_gpt54
#     base_url: https://openrouter.ai/api/v1
#     model: openai/gpt-5.4
#     api_key: ${OPENROUTER_API_KEY}
#     tier: 1

# ── Overrides ────────────────────────────────────────────────────────────────
# Tweak auto-detected service defaults without writing a full config.
# overrides:
#   claude_code:
#     weight: 1.2
#   codex:
#     weight: 0.8
#   gemini_cli:
#     thinking_level: medium   # override the default "high"
